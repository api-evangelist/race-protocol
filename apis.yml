aid: race-protocol
name: RACE Protocol
description: >-
  RACE Protocol is a multi-chain, on-chain infrastructure for developing and
  deploying secure and fair web3 games. It is delivered primarily through a
  TypeScript/JavaScript SDK (sdk-core, sdk-solana, sdk-sui, sdk-facade) and a
  command-line tool (race-cli) for game bundle publishing, account management,
  and payment claims, rather than as a traditional REST API. Smart contracts
  run on Solana and Sui.
